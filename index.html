<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz App</title>
    <link rel="stylesheet" href="src/styles/main.css">
</head>
<body>

    <div class="container">
        <p class="js-show-result"></p>
        <div>
            <h3 class="js-title"></h3>

            <ul class="js-options options"></ul>
        </div>
        
        <div class="button-div">
            <button class="js-previous-button previous-button">Back</button>

            <div class="restart-container">
                <button class="js-restart-button restart-button">Restart Quiz</button>
            </div>

            <button class="js-next-button next-button">Next</button>
        </div>

        <p class="js-score"></p>

    </div>
    <script src="src/scripts/main.js"></script>
</body>
</html>
